apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 87.15.1
    helm:
      valuesObject:
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeProxy:
          enabled: false
        kubeEtcd:
          enabled: false
        defaultRules:
          rules:
            etcd: false
            kubeControllerManager: false
            kubeProxy: false
            kubeSchedulerAlerting: false
            kubeSchedulerRecording: false
        prometheusOperator:
          admissionWebhooks:
            enabled: false
          tls:
            enabled: false
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 160Mi
        prometheus:
          prometheusSpec:
            retention: 3d
            retentionSize: 3GiB
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            probeSelectorNilUsesHelmValues: false
            resources:
              requests:
                cpu: 100m
                memory: 400Mi
              limits:
                memory: 800Mi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: local-path
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 4Gi
        alertmanager:
          alertmanagerSpec:
            secrets:
              - telegram-bot
            resources:
              requests:
                cpu: 10m
                memory: 48Mi
              limits:
                memory: 96Mi
          config:
            global:
              resolve_timeout: 5m
            route:
              group_by:
                - alertname
                - namespace
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 4h
              receiver: telegram
              routes:
                - receiver: "null"
                  matchers:
                    - alertname = "Watchdog"
            receivers:
              - name: "null"
              - name: telegram
                telegram_configs:
                  - bot_token_file: /etc/alertmanager/secrets/telegram-bot/token
                    chat_id: 1006985004
                    parse_mode: HTML
                    send_resolved: true
                    message: |-
                      {{ range .Alerts }}{{ if eq .Status "firing" }}🔴 <b>FIRING</b>{{ else }}✅ <b>RESOLVED</b>{{ end }} — <b>{{ .Labels.alertname }}</b>
                      severity: {{ .Labels.severity }}{{ if .Labels.namespace }} | ns: {{ .Labels.namespace }}{{ end }}{{ if .Labels.pod }} | pod: {{ .Labels.pod }}{{ end }}
                      {{ .Annotations.summary }}
                      {{ .Annotations.description }}
                      {{ end }}
        grafana:
          ingress:
            enabled: true
            ingressClassName: traefik
            hosts:
              - grafana.homelab
          additionalDataSources:
            - name: Loki
              type: loki
              access: proxy
              url: http://loki.loki.svc.cluster.local:3100
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 300Mi
          sidecar:
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 128Mi
        kube-state-metrics:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 96Mi
        prometheus-node-exporter:
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 48Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
