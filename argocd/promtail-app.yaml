apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: promtail
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: promtail
    targetRevision: 6.17.1
    helm:
      valuesObject:
        config:
          clients:
            - url: http://loki.loki.svc.cluster.local:3100/loki/api/v1/push
        resources:
          requests:
            cpu: 30m
            memory: 64Mi
          limits:
            memory: 128Mi
        serviceMonitor:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: loki
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
