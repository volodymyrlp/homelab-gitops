apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-backup-pvc
  namespace: url-shortener
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mysql-backup
  namespace: url-shortener
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: mysqldump
              image: mysql:8.0@sha256:7dcddc01f13bab2f15cde676d44d01f61fc9f99fe7785e86196dfc07d358ae2b
              imagePullPolicy: IfNotPresent
              command:
                - sh
                - -c
                - |
                  set -e
                  ts=$(date +%Y%m%d-%H%M%S)
                  mysqldump -h mysql -uroot -p"$MYSQL_ROOT_PASSWORD" \
                    --single-transaction --databases urlshortener \
                    | gzip > /backup/urlshortener-$ts.sql.gz
                  ls -1t /backup/urlshortener-*.sql.gz | tail -n +8 | xargs -r rm -f
                  echo "backup done: urlshortener-$ts.sql.gz ($(du -h /backup/urlshortener-$ts.sql.gz | cut -f1))"
              env:
                - name: MYSQL_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: mysql-secret
                      key: MYSQL_ROOT_PASSWORD
              volumeMounts:
                - name: backup
                  mountPath: /backup
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: mysql-backup-pvc
